# NewsHub — Docker Compose para desarrollo local
# Uso: docker compose up -d
#
# Puerto 5434 para no chocar con michael (5433) ni subastamicoche (5432).

services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: newshub
      POSTGRES_PASSWORD: newshub_dev
      POSTGRES_DB: newshub
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U newshub -d newshub"]
      interval: 5s
      timeout: 3s
      retries: 5

  embed:
    build: ./services/embed
    environment:
      PORT: 8089
    ports:
      - "8089:8089"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8089/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

volumes:
  pgdata:
